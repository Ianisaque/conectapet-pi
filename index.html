<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaPet - Cuidadores Profissionais</title>
    <style>
        /* CSS - Estilo Geral e Responsividade (O Mago do Visual) */
        :root {
            --primary: #4a90e2;
            --secondary: #f5a623;
            --dark: #333;
            --light: #f9f9f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: white;
            padding: 0.8rem 2rem; /* Reduzi um pouco o espaçamento interno */
            display: flex;
            justify-content: space-between;
            align-items: center; /* Alinha o botão e a logo verticalmente no meio */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }


        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .btn-acessibilidade {
            background: var(--dark);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .hero {
            background: linear-gradient(135deg, #4dcbf1 0%, #50e3c3 100%);
            color: white;
            text-align: center;
            padding: 3rem 1rem;
        }

        .hero h1 { margin-bottom: 0.5rem; }

        main {
            flex: 1;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            width: 100%;
        }

        .titulo-secao {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        /* Grid Responsivo para os Cards */
        .grid-cuidadores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            border: 3px solid var(--primary);
        }

        .card h3 { margin-bottom: 0.5rem; }
        .card .servico { color: #777; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .card .bairro { font-weight: bold; font-size: 0.95rem; margin-bottom: 0.5rem; }
        .card .preco { color: var(--primary); font-weight: bold; font-size: 1.1rem; margin-bottom: 1rem; }

        .btn-contato {
            display: inline-block;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Classe de Alto Contraste (Acessibilidade) */
        body.alto-contraste {
            background: #000 !important;
            color: #fff !important;
        }
        body.alto-contraste .card, body.alto-contraste header {
            background: #111 !important;
            border: 1px solid #fff;
        }
        body.alto-contraste .card h3, body.alto-contraste .card .servico, body.alto-contraste .card .bairro, body.alto-contraste .card .preco {
            color: #fff !important;
        }
    </style>
</head>
<body>

    <header>
    <div class="logo">
        <!-- Definimos uma altura máxima fixa para a logo não quebrar o layout -->
        <img src="logo-teco.png" alt="Logo Teco" style="height: 60px; max-height: 60px; width: auto; display: block;">
    </div>
    <button class="btn-acessibilidade" onclick="alternarContraste()">⚡ Alto Contraste</button>
</header>


    <section class="hero">
        <h1>O cuidado que seu pet merece</h1>
        <p>Encontre passeadores e cuidadores qualificados no seu bairro.</p>
    </section>

    <main>
        <h2 class="titulo-secao">Profissionais Disponíveis</h2>
        <!-- Os cards serão injetados aqui pelo JavaScript -->
        <div class="grid-cuidadores" id="lista-cuidadores">
            <p style="text-align: center; grid-column: 1/-1;">Carregando cuidadores...</p>
        </div>
    </main>

    <script>
        // JAVASCRIPT - Consumo de API e Interatividade (O Lógico)
        
        // 1. Consumindo a API simulada no Python
        async function buscarCuidadores() {
            try {
                const resposta = await fetch('/api/cuidadores');
                const cuidadores = await resposta.json();
                renderizarCards(cuidadores);
            } catch (erro) {
                console.error("Erro ao buscar dados:", erro);
                document.getElementById('lista-cuidadores').innerHTML = "<p>Erro ao carregar profissionais.</p>";
            }
        }

        // 2. Renderizando os cards na tela dinamicamente
        function renderizarCards(lista) {
            const container = document.getElementById('lista-cuidadores');
            container.innerHTML = ""; // Limpa o texto de carregando

            lista.forEach(cuidador => {
                const cardHtml = `
                    <div class="card">
                        <img src="${cuidador.foto}" alt="Foto de ${cuidador.nome}">
                        <h3>${cuidador.nome}</h3>
                        <p class="servico">${cuidador.servico}</p>
                        <p class="bairro">📍 ${cuidador.bairro}</p>
                        <p>${cuidador.avaliacao}</p>
                        <p class="preco">${cuidador.preco}</p>
                        <a href="https://wa.me!" target="_blank" class="btn-contato">📱 Chamar no WhatsApp</a>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // 3. Função de Acessibilidade (Critério SENAC)
        function alternarContraste() {
            document.body.classList.toggle('alto-contraste');
        }

        // Inicializa a busca quando a página carrega
        window.onload = buscarCuidadores;
    </script>
</body>
</html>
